<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhaskar | Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0d0d0d;color:#fff;overflow-x:hidden}

canvas{position:fixed;top:0;left:0;z-index:-1}

header{display:flex;justify-content:space-between;padding:20px 50px;background:rgba(0,0,0,0.3)}
header h2{background:linear-gradient(45deg,#f5a623,#ff4e50,#24c6dc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

section{padding:60px 50px;text-align:center}

.home{display:flex;justify-content:space-between;align-items:center}
.left{max-width:50%}
.name{color:#f5a623}

.skills .bar{background:#222;border-radius:20px;margin:10px 0}
.skills .fill{height:10px;background:#f5a623;border-radius:20px}

.projects{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:#1a1a1a;padding:20px;border-radius:10px}

iframe{width:100%;height:400px;border:none;border-radius:10px}
</style>
</head>

<body>
<canvas id="bg"></canvas>

<header>
<h2>Bhaskar Ghorui</h2>
</header>

<section class="home">
<div class="left">
<h1>Hello, I'm <span class="name">Bhaskar</span></h1>
<p>Data Analyst | MIS Executive</p>
</div>
<img src="myphoto.jpg" width="250">
</section>

<section>
<h2>Skills</h2>
<div class="skills">
<p>Excel</p><div class="bar"><div class="fill" style="width:90%"></div></div>
<p>Power BI</p><div class="bar"><div class="fill" style="width:80%"></div></div>
<p>SQL</p><div class="bar"><div class="fill" style="width:70%"></div></div>
</div>
</section>

<section>
<h2>Experience</h2>
<p>Fresher | Learning Data Analytics & Building Projects</p>
</section>

<section>
<h2>Power BI Dashboard</h2>
<iframe src="https://app.powerbi.com/view?r=YOUR_LINK"></iframe>
</section>

<script>
// particles
const canvas=document.getElementById('bg');
const ctx=canvas.getContext('2d');
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
let particles=[];

for(let i=0;i<100;i++){
particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:2})
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle='white';
particles.forEach(p=>{
p.y+=0.5;
if(p.y>canvas.height)p.y=0;
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
