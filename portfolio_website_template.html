<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bhaskar | Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{background:#0d0d0d;color:#fff;transition:0.3s}

.light-mode{background:#fff;color:#000}

header{display:flex;justify-content:space-between;padding:20px 50px;background:#111}
button{padding:8px 15px;border:none;background:#f5a623;cursor:pointer}

section{padding:50px;text-align:center}

.projects{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:#1a1a1a;padding:20px;border-radius:10px}

.chatbox{
position:fixed;bottom:20px;right:20px;width:250px;background:#222;padding:10px;border-radius:10px
}

</style>
</head>

<body>

<header>
<h2>Bhaskar Portfolio</h2>
<div>
<button onclick="toggleMode()">🌗 Mode</button>
<button onclick="sharePage()">🔗 Share</button>
</div>
</header>

<section>
<h1>Bhaskar Ghorui</h1>
<p>Data Analyst | MIS Executive</p>
<img src="myphoto.jpg" width="200">
</section>

<section>
<h2>Projects</h2>
<div class="projects">

<div class="card">
<h3>Sales Dashboard</h3>
<p>Power BI Project</p>
<a href="#" download>Download File</a>
</div>

<div class="card">
<h3>HR Analytics</h3>
<p>Excel Project</p>
<a href="#" download>Download File</a>
</div>

</div>
</section>

<section>
<h2>Experience</h2>
<p>Fresher | Data Analytics Projects</p>
</section>

<div class="chatbox">
<p>🤖 Ask me anything!</p>
<input type="text" placeholder="Type...">
</div>

<script>
function toggleMode(){
document.body.classList.toggle('light-mode');
}

function sharePage(){
navigator.clipboard.writeText(window.location.href);
alert("Link copied! Share anywhere.");
}
</script>

</body>
</html>
